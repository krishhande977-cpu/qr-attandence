<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Attend Login</title>

<style>

:root{
--primary-glow:#00d2ff;
--accent-yellow:#fff9a0;
--bg-dark:#0f172a;
--glass:rgba(255,255,255,0.05);
--glass-border:rgba(255,255,255,0.1);
}

/* BODY */

body{
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1e293b 0%,#0f172a 100%);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* ANIMATIONS */

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@keyframes glow{
from{ text-shadow:0 0 10px #fff,0 0 20px var(--accent-yellow);}
to{ text-shadow:0 0 20px #fff,0 0 40px var(--accent-yellow);}
}

@keyframes pulse{
0%,100%{box-shadow:0 0 0 0 rgba(0,210,255,0.7);}
50%{box-shadow:0 0 0 10px rgba(0,210,255,0);}
}

@keyframes slideInLeft{
from{opacity:0;transform:translateX(-40px);}
to{opacity:1;transform:translateX(0);}
}

@keyframes slideInUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes rotateIn{
from{opacity:0;transform:rotate(-180deg) scale(0.5);}
to{opacity:1;transform:rotate(0deg) scale(1);}
}

@keyframes shimmer{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

@keyframes scanLine{
0%{text-shadow:0 0 5px #fff,0 0 10px #00d2ff;}
50%{text-shadow:0 0 15px #fff,0 0 30px #00d2ff,0 0 40px rgba(0,210,255,0.5);}
100%{text-shadow:0 0 5px #fff,0 0 10px #00d2ff;}
}

@keyframes fadeSlideIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* LOGIN CARD */

.container{
background:var(--glass);
border:1px solid var(--glass-border);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
width:420px;
animation:float 6s ease-in-out infinite;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
border-bottom:1px solid rgba(255,255,255,0.1);
padding-bottom:15px;
animation:slideInLeft 1s ease-out forwards;
}

/* LOGO */

.logo{
width:65px;
height:auto;
animation:rotateIn 1.2s cubic-bezier(0.68,-0.55,0.265,1.55) forwards;
}

/* COLLEGE TITLE */

.college-title{
font-size:18px;
font-weight:bold;
line-height:1.3;
animation:slideInLeft 1s ease-out forwards 0.3s,scanLine 3s ease-in-out infinite 1.3s;
}

/* LOGIN HEADING */

h2{
text-align:center;
margin-bottom:20px;
animation:fadeSlideIn 1s ease-out forwards 0.5s;
}

/* TABS */

.tabs{
display:flex;
margin-bottom:20px;
border-radius:10px;
overflow:hidden;
}

.tabs button{
flex:1;
padding:12px;
border:none;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:white;
transition:0.3s;
animation:fadeSlideIn 1s ease-out forwards;
}

.tabs button:nth-child(1){
animation-delay:0.6s;
}

.tabs button:nth-child(2){
animation-delay:0.7s;
}

.tabs button.active{
background:var(--primary-glow);
color:black;
font-weight:bold;
animation:pulse 1.5s infinite;
}

/* FORMS */

form{
display:none;
}

form.active{
display:block;
}

/* INPUT FIELDS (NO WHITE COLOR) */

input{
width:100%;
padding:12px;
margin:10px 0;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:8px;
font-size:14px;
backdrop-filter:blur(5px);
animation:slideInUp 0.8s ease-out forwards;
transition:box-shadow 0.3s,border-color 0.3s;
}

input:nth-of-type(1){
animation-delay:0.8s;
}

input:nth-of-type(2){
animation-delay:0.9s;
}

input:nth-of-type(3){
animation-delay:1s;
}

input::placeholder{
color:#ccc;
}

input:focus{
outline:none;
border:1px solid #00d2ff;
box-shadow:0 0 8px #00d2ff,0 0 15px rgba(0,210,255,0.3);
background:rgba(0,210,255,0.05);
}

/* LOGIN BUTTON */

.login{
width:100%;
padding:12px;
margin-top:10px;
background:linear-gradient(90deg,#00d2ff,#3a7bd5);
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
color:black;
animation:slideInUp 0.8s ease-out forwards 1.1s,bounce 2s ease-in-out infinite 1.9s;
position:relative;
overflow:hidden;
}

.login::before{
content:'';
position:absolute;
top:-2px;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
animation:shimmerSlide 3s infinite;
}

@keyframes shimmerSlide{
0%{left:-100%;}
100%{left:100%;}
}

.login:hover{
box-shadow:0 0 20px var(--primary-glow);
transform:scale(1.05);
}

/* SKIP LINK */

.skip-link{
text-align:center;
margin-top:20px;
animation:fadeSlideIn 1s ease-out forwards 1.2s;
}

.skip-link a{
color:var(--primary-glow);
text-decoration:none;
font-size:0.9rem;
transition:all 0.3s ease;
position:relative;
}

.skip-link a::after{
content:'';
position:absolute;
bottom:-2px;
left:0;
width:0;
height:2px;
background:var(--primary-glow);
transition:width 0.3s ease;
}

.skip-link a:hover{
text-decoration:none;
}

.skip-link a:hover::after{
width:100%;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGO + COLLEGE NAME -->

<div class="header">
<img src="logo.png.jpeg" class="logo">

<h1 class="college-title">
JD College of Engineering and Management
</h1>
</div>

<h2>Home page</h2>



<!-- ADMIN LOGIN -->


<div class="skip-link">
<a href="/QR.html">Skip Login → Go to Dashboard</a>
</div>

</div>

<script>

function showForm(type){

document.getElementById("adminForm").classList.remove("active");
document.getElementById("studentForm").classList.remove("active");

document.querySelectorAll(".tabs button").forEach(btn=>{
btn.classList.remove("active");
});

if(type==="admin"){
document.getElementById("adminForm").classList.add("active");
document.querySelectorAll(".tabs button")[0].classList.add("active");
}
else{
document.getElementById("studentForm").classList.add("active");
document.querySelectorAll(".tabs button")[1].classList.add("active");
}

}

function adminLogin(){

let user=document.getElementById("adminUser").value;
let pass=document.getElementById("adminPass").value;

if(user==="admin" && pass==="1234"){

alert("Admin Login Successful");
window.location="https://krishhande977-cpu.github.io/qr-attandence/QR.html";

}
else{

alert("Invalid Admin Login");

}

}

function studentLogin(){

let studentId=document.getElementById("studentId").value;
let studentName=document.getElementById("Name").value;

if(studentId && studentName){
alert("Student Login Successful");
window.location="https://krishhande977-cpu.github.io/qr-attandence/QR.html";
}
else{
alert("Please enter Student ID and Name");
}

}

</script>

</body>
</html>
