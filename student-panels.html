    <style>
        :root {
            --bg: #030712;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #030712);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        nav {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .field-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        select, input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            transition: 0.3s;
        }

        select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px var(--accent-glow); }

        .btn-action {
            background: var(--accent);
            color: #030712;
            font-weight: 700;
            border: none;
            padding: 13px 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }

        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { padding: 15px; text-align: left; color: #64748b; font-size: 13px; }
        
        tr { transition: 0.3s; }
        td { 
            background: rgba(30, 41, 59, 0.4); 
            padding: 15px; 
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        td:first-child { border-radius: 12px 0 0 12px; border-left: 1px solid rgba(255,255,255,0.05); }
        td:last-child { border-radius: 0 12px 12px 0; border-right: 1px solid rgba(255,255,255,0.05); }

        tr:hover td { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }

        .status-pill {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        @media print {
            body { background: white; color: black; }
            .glass-panel, nav { display: none !important; }
            td { background: white !important; color: black; border: 1px solid #ddd; }
        }
    </style>

<script>
    function addEntry() {
        const name = document.getElementById('stuName').value;
        const sub = document.getElementById('subject').value;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        if(!name) { alert("Please select a student name!"); return; }

        const table = document.getElementById('attendanceTable').getElementsByTagName('tbody')[0];
        const row = table.insertRow(0); 
        row.style.opacity = "0";
        
        row.innerHTML = `
            <td style="font-weight:700">${name}</td>
            <td style="color:#94a3b8">${sub}</td>
            <td>${time}</td>
            <td style="color:#38bdf8">📍 Nagpur, IN</td>
            <td><span class="status-pill">PRESENT</span></td>
        `;

        setTimeout(() => { row.style.opacity = "1"; row.style.transition = "0.5s"; }, 10);
    }

    function downloadExcel() {
        let csv = [];
        const rows = document.querySelectorAll("table tr");
        for (let i = 0; i < rows.length; i++) {
            let row = [], cols = rows[i].querySelectorAll("td, th");
            for (let j = 0; j < cols.length; j++) row.push('"' + cols[j].innerText + '"');
            csv.push(row.join(","));        
        }
        const blob = new Blob([csv.join("\n")], { type: "text/csv" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Attendance_Master_2026.csv";
        link.click();
    }
</script>
