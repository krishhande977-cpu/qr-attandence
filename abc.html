<!DOCTYPE html>
<html>
<head>
<title>Smart Attendance</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#081b29;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

.container{
width:360px;
padding:25px;
background:#0d2b3e;
border-radius:15px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

.btns{
display:flex;
gap:10px;
margin-top:20px;
}

.btn{
flex:1;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.present{background:#00c853;}
.absent{background:#d50000;}

.submit{
margin-top:20px;
width:100%;
padding:15px;
background:#00b0ff;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Attendance System</h1>

<div class="container">

<h2>Mark Attendance</h2>

<input id="subject" placeholder="Subject">

<input id="studentId" placeholder="Student ID">

<input id="name" placeholder="Full Name">

<div class="btns">
<div class="btn present" onclick="setStatus('Present')">Present</div>
<div class="btn absent" onclick="setStatus('Absent')">Absent</div>
</div>

<button class="submit" onclick="submitAttendance()">Submit</button>

</div>

<script>

let status="Present";

function setStatus(s){
status=s;
}

// URL se session read karega
const params = new URLSearchParams(window.location.search);
const session = params.get("session");

if(session){
document.getElementById("subject").value=session;
}

function submitAttendance(){

const subject=document.getElementById("subject").value;
const studentId=document.getElementById("studentId").value;
const name=document.getElementById("name").value;

if(subject=="" || studentId=="" || name==""){
alert("Fill all fields");
return;
}

const time = new Date().toISOString();

fetch('/attendance', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ studentId, name, status, time })
}).then(resp => {
  if (!resp.ok) throw new Error('Network response not ok');
  return resp.json();
}).then(saved => {
  alert("Attendance Saved");
}).catch(err => {
  console.error(err);
  alert("Failed to save attendance");
});

}

</script>

</body>
</html>
