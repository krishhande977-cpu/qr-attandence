<!DOCTYPE html>
<html>
<head>
<title>Smart Attendance</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- supabase client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#081b29;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

.container{
width:360px;
padding:25px;
background:#0d2b3e;
border-radius:15px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

.btns{
display:flex;
gap:10px;
margin-top:20px;
}

.btn{
flex:1;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.present{background:#00c853;}
.absent{background:#d50000;}

.submit{
margin-top:20px;
width:100%;
padding:15px;
background:#00b0ff;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Attendance System</h1>

<div class="container">

<h2>Mark Attendance</h2>

<input id="subject" placeholder="Subject">

<input id="studentId" placeholder="Student ID">

<input id="name" placeholder="Full Name">

<div class="btns">
<div class="btn present" onclick="setStatus('Present')">Present</div>
<div class="btn absent" onclick="setStatus('Absent')">Absent</div>
</div>

<button class="submit" onclick="submitAttendance()">Submit</button>

</div>

<script>

let status="Present";

function setStatus(s){
  status=s;
}

// supabase init
 const SUPABASE_URL = 'https://larwsqghepyjtxbhgdfr.supabase.co'; // e.g. https://xyz.supabase.co
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhcndzcWdoZXB5anR4YmhnZGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDE0MzksImV4cCI6MjA4ODM3NzQzOX0.bZucFYWv1nzaNernoNqhtsq0U7o2bXGX9bD9clv8jmU';
   
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// URL se session read karega (optional, not stored to DB)
const params = new URLSearchParams(window.location.search);
const session = params.get("session");

if(session){
  document.getElementById("subject").value=session;
}

async function submitAttendance(){
  const studentId=document.getElementById("studentId").value.trim();
  const name=document.getElementById("name").value.trim();

  if(studentId=="" || name==""){
    alert("Fill all fields");
    return;
  }

  const time = new Date().toISOString();

  try {
    const { data, error } = await   supabaseClient
      .from('attendance')
      .insert([{ student_id: studentId, name, status, created_at: time }]);
    if (error) throw error;
    alert("Attendance Saved");
  } catch (err) {
    console.error(err);
    alert("Failed to save attendance");

  }
  
<div id="dashboard" class="page active">
  <h2>📊 Real-Time Analytics</h2>
  <select id="subject" onchange="updateUI()">
      <option>Formal Languages & Automata Theory(CS4T001)</option>
    <option>Design & Analysis of Algorithms(CS4T002)</option>
    <option>Foundation of Large Language Model(CS4M002)</option>
    <option>Open Elective-2 Business Data Processing(AI4O018)</option>
    <option>Graph Theory(BS4O010)</option>
    <option>Open Elective-2 Disaster Management(CE4O011)</option>
    <option>Open Elective-2 Ethical Hacking(CS4O015)</option>
    <option>Open Elective-2 German Language(DS4O017)</option>
    <option>Open Elective-2 Japanese Language(IT4O016)</option>
    <option>Open Elective-2 Green Energy(EE4O012)</option>
    <option>Open Elective-2 Indestry 4.0(ME4O013)</option>  
    <option>Digital Marketing(ET4O014)</option>
    <option>Management Application Software(CS4H002)</option>
    <option>JDCAP-2(CSV002)</option>
    <option>UI/UX Lab(CS4L001)</option>
    <option>Design & Analysis of Algorithms Lab(CS4T002)</option>
    <option>Data Analytics(CS4L003)</option>
    <option>Mini Project(CS4P002)</option>
  </select>
  <div class="card">
    Present: <span id="present">0</span> | Absent: <span id="absent">0</span> | Ratio: <span id="percent">0%</span>
  </div>
  <div class="chart-box"><canvas id="chart"></canvas></div>
</div>
}

</script>

</body>
</html>
