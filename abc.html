<!DOCTYPE html>
<html>
<head>
<title>Smart Attendance</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- supabase client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
background:#081b29;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

.container{
width:360px;
padding:25px;
background:#0d2b3e;
border-radius:15px;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

.btns{
display:flex;
gap:10px;
margin-top:20px;
}

.btn{
flex:1;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.present{background:#00c853;}
.absent{background:#d50000;}

.submit{
margin-top:20px;
width:100%;
padding:15px;
background:#00b0ff;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Attendance System</h1>

<div class="container">

<h2>Mark Attendance</h2>

<input id="subject" placeholder="Subject">

<input id="studentId" placeholder="Student ID">

<input id="name" placeholder="Full Name">

<div class="btns">
<div class="btn present" onclick="setStatus('Present')">Present</div>
<div class="btn absent" onclick="setStatus('Absent')">Absent</div>
</div>

<button class="submit" onclick="submitAttendance()">Submit</button>

</div>
<script>

let status="Present";

function setStatus(s){
  status=s;
}

// supabase init
 const SUPABASE_URL = 'https://larwsqghepyjtxbhgdfr.supabase.co'; // e.g. https://xyz.supabase.co
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxhcndzcWdoZXB5anR4YmhnZGZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MDE0MzksImV4cCI6MjA4ODM3NzQzOX0.bZucFYWv1nzaNernoNqhtsq0U7o2bXGX9bD9clv8jmU';
   
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// URL se session read karega (optional, not stored to DB)
const params = new URLSearchParams(window.location.search);
const session = params.get("session");

if(session){
  document.getElementById("subject").value=session;
}

async function submitAttendance(){
  const studentId=document.getElementById("studentId").value.trim();
  const name=document.getElementById("name").value.trim();

  if(studentId=="" || name==""){
    alert("Fill all fields");
    return;
  }

  const time = new Date().toISOString();

  try {
    const { data, error } = await   supabaseClient
      .from('attendance')
      .insert([{ student_id: studentId, name, status, created_at: time }]);
    if (error) throw error;
    alert("Attendance Saved");
  } catch (err) {
    console.error(err);
    alert("Failed to save attendance");

  }
  

}

</script>

</body>
</html>
