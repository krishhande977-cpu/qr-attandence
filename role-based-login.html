<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attend | System Entry</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #0f1115;
            --accent: #00ff41; 
            --accent-dim: rgba(0, 255, 65, 0.2);
            --border: #222;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-frame {
            width: 100%;
            max-width: 450px;
            padding: 2px;
            background: linear-gradient(135deg, var(--border), #444, var(--border));
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .auth-inner {
            background: var(--panel);
            padding: 40px;
            border-radius: 3px;
            position: relative;
        }

        .system-id {
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        h2 { font-size: 24px; margin: 0 0 30px 0; font-weight: 300; text-transform: uppercase; }

        .role-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        .role-box {
            border: 1px solid var(--border);
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            background: rgba(255,255,255,0.02);
        }

        .role-box.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
            box-shadow: inset 0 0 10px var(--accent-dim);
        }

        .role-box span { display: block; font-size: 11px; margin-top: 5px; opacity: 0.6; }

        .field { margin-bottom: 20px; position: relative; }
        
        label {
            position: absolute;
            top: -8px; left: 12px;
            background: var(--panel);
            padding: 0 5px;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            padding: 15px;
            color: white;
            box-sizing: border-box;
            font-family: monospace;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn-entry {
            width: 100%;
            background: var(--accent);
            color: black;
            border: none;
            padding: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);
            transition: 0.3s;
        }

        .btn-entry:hover {
            background: #fff;
            box-shadow: 0 0 20px var(--accent);
        }

        /* NEW BACK BUTTON STYLES */
        .back-container {
            text-align: center;
            margin-top: 25px;
        }

        .btn-back {
            color: #666;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            transition: 0.3s;
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid transparent;
            text-transform: uppercase;
        }

        .btn-back span {
            color: var(--accent);
            margin-right: 5px;
        }

        .btn-back:hover {
            color: var(--accent);
            border-color: var(--accent-dim);
            background: rgba(0, 255, 65, 0.05);
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 1px;
            background: var(--accent);
            opacity: 0.2;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <div class="auth-frame">
        <div class="auth-inner">
            <div class="scan-line"></div>
            <span class="system-id">NIT-QRA-2026 // SECURE_NODE</span>
            <h2>Authentication</h2>

            <div class="role-grid">
                <div id="tBox" class="role-box selected" onclick="pickRole('teacher')">
                    <b>FACULTY</b>
                    <span>ADMIN ACCESS</span>
                </div>
                <div id="sBox" class="role-box" onclick="pickRole('student')">
                    <b>STUDENT</b>
                    <span>CHECK-IN ONLY</span>
                </div>
            </div>

            <div class="field">
                <label id="uidLabel">Faculty Credential</label>
                <input type="text" id="uid" placeholder="ID_NUMBER_XXXX">
            </div>

            <div class="field">
                <label>Security Override</label>
                <input type="password" placeholder="••••••••">
            </div>

            <button class="btn-entry" onclick="login()">Initiate Session</button>

            <div class="back-container">
                <a href="QR attandance system/features1.html" class="btn-back">
                    <span>&lt;</span> TERMINAL_EXIT
                </a>
            </div>
        </div>
    </div>

<script>
    let role = 'teacher';

    function pickRole(r) {
        role = r;
        document.getElementById('tBox').className = (r === 'teacher') ? 'role-box selected' : 'role-box';
        document.getElementById('sBox').className = (r === 'student') ? 'role-box selected' : 'role-box';
        document.getElementById('uidLabel').innerText = (r === 'teacher') ? 'Faculty Credential' : 'Student Roll Number';
    }

    function login() {
        const val = document.getElementById('uid').value;
        if(!val) return alert("INPUT REQUIRED");
        
        sessionStorage.setItem('role', role);
        document.querySelector('.btn-entry').innerText = "AUTHORIZING...";
        
        setTimeout(() => {
            window.location.href = (role === 'teacher') ? 'teacher.html' : 'student.html';
        }, 1000);
    }
</script>

</body>
</html>
