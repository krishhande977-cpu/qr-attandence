<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attend | Cloud Infrastructure</title>
    <style>
        :root {
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --success: #10b981;
            --text: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #020617);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        nav {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 18px; margin-top: 0; color: var(--accent); display: flex; align-items: center; gap: 10px; }

        /* Status Light */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

        .form-item { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .api-key { font-family: 'Courier New', monospace; letter-spacing: 1px; }

        .btn-save {
            background: var(--accent);
            color: #020617;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-save:hover { box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }

        .cloud-icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <div style="font-weight: 800; font-size: 20px;">SYSTEM INFRASTRUCTURE</div>
        <a href="QR attandance system/features1.html" style="color:white; text-decoration:none; font-size:14px; opacity:0.7;">BACK TO DASHBOARD</a>
    </nav>

    <div class="config-grid">
        <div class="glass-panel">
            <div class="cloud-icon">☁️</div>
            <h2>Cloud Sync Status</h2>
            <div class="status-pill"><div class="dot"></div> LOCALHOST CONNECTED</div>
            <p style="color: #64748b; font-size: 13px; margin: 15px 0 25px;">Data is currently syncing to local storage. Connect to Firebase for real-time cloud backup.</p>
            
            <div class="form-item">
                <label>Database Provider</label>
                <select>
                    <option>Firebase Realtime DB</option>
                    <option>Supabase (PostgreSQL)</option>
                    <option>Google Sheets API</option>
                </select>
            </div>

            <div class="form-item">
                <label>Project Endpoint URL</label>
                <input type="text" value="https://qr-attend-nit-2026.firebaseio.com" class="api-key">
            </div>

            <button class="btn-save" onclick="alert('Cloud Configuration Saved!')">Update Sync</button>
        </div>

        <div class="glass-panel">
            <div class="cloud-icon">🔒</div>
            <h2>Security Protocols</h2>
            
            <div class="form-item">
                <label>GPS Fence Radius (Meters)</label>
                <input type="number" value="50">
            </div>

            <div class="form-item">
                <label>Time-Lock Encryption</label>
                <select>
                    <option>AES-256 (High Security)</option>
                    <option>SHA-256 (Faster Sync)</option>
                </select>
            </div>

            <div class="form-item">
                <label>Session Expiry Buffer (Sec)</label>
                <input type="number" value="30">
            </div>

            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;">
                <p style="margin:0; font-size: 12px; color: #94a3b8;"><b>Admin Note:</b> Reducing GPS radius below 20m may cause scan failures in indoor labs.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
